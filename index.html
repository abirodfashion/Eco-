        <div class="min-h-screen bg-farm-light flex items-center justify-center p-6 pt-24">
            <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-2xl overflow-hidden">
                <div class="p-8 sm:p-12">
                    <div class="text-center mb-10">
                        <h2 class="text-3xl font-serif font-bold text-slate-900 mb-2">Complete Your Profile</h2>
                        <p class="text-slate-500">Please provide the following details to access your dashboard</p>
                    </div>
                    <form id="completeProfileForm" class="space-y-6">
                        <div class="flex flex-col items-center mb-8">
                            <div class="w-24 h-24 rounded-full bg-slate-100 border-2 border-dashed border-slate-300 flex items-center justify-center relative overflow-hidden group cursor-pointer" onclick="document.getElementById('profilePhotoInput').click()">
                                <img id="profilePreview" src="" class="hidden w-full h-full object-cover">
                                <i data-lucide="camera" class="w-8 h-8 text-slate-400 group-hover:text-farm-green transition-colors"></i>
                                <input type="file" id="profilePhotoInput" accept="image/*" class="hidden" onchange="previewImage(this, 'profilePreview')">
                            </div>
                            <p class="text-xs text-slate-400 mt-2">Upload Profile Photo *</p>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div class="relative"><i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><input name="fullName" placeholder="Full Name *" required class="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:border-farm-green outline-none transition-all"></div>
                            <div class="relative"><i data-lucide="at-sign" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><input name="username" placeholder="Username *" required class="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:border-farm-green outline-none transition-all"></div>
                        </div>
                        <div class="relative"><i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><input name="password" type="password" placeholder="New Password *" required class="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:border-farm-green outline-none transition-all"></div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div class="relative"><i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><input name="mobile" placeholder="Mobile Number *" required class="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:border-farm-green outline-none transition-all"></div>
                            <div class="relative"><i data-lucide="message-square" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><input name="whatsApp" placeholder="WhatsApp Number *" required class="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:border-farm-green outline-none transition-all"></div>
                        </div>
                        <div id="entrepreneurFields" class="hidden space-y-6">
                            <div class="p-6 bg-amber-50 rounded-2xl border border-amber-100">
                                <p class="text-sm font-bold text-amber-800 mb-4 flex items-center gap-2"><i data-lucide="info" class="w-4 h-4"></i> Entrepreneur Verification Required</p>
                                <div class="flex flex-col items-center">
                                    <div class="w-full h-32 rounded-2xl bg-white border-2 border-dashed border-slate-300 flex items-center justify-center relative overflow-hidden group cursor-pointer" onclick="document.getElementById('nidInput').click()">
                                        <img id="nidPreview" src="" class="hidden w-full h-full object-contain">
                                        <div class="text-center group-hover:text-farm-green transition-colors">
                                            <i data-lucide="upload" class="w-8 h-8 mx-auto text-slate-400 mb-2"></i>
                                            <p class="text-xs text-slate-400">Upload NID Photo *</p>
                                        </div>
                                        <input type="file" id="nidInput" accept="image/*" class="hidden" onchange="previewImage(this, 'nidPreview')">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="w-full glossy-button py-4 text-lg font-bold mt-4 shadow-xl shadow-farm-green/20">Complete Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </template>

    <template id="dashboard-template">
        <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleMobileMenu()"></div>
        <div class="min-h-screen bg-slate-50 flex flex-col md:flex-row pt-20">
            <!-- Admin Sidebar -->
            <aside id="adminSidebar" class="hidden w-full md:w-72 bg-white border-r border-slate-200 flex-col sticky top-20 h-[calc(100vh-5rem)] z-40">
                <div class="p-6 border-b border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-2xl bg-farm-green flex items-center justify-center text-white font-bold text-xl" id="dashUserInitial">A</div>
                        <div>
                            <p class="font-bold text-slate-900 text-sm" id="dashUserName">Admin Name</p>
                            <p class="text-xs text-slate-500" id="dashUserRole">Administrator</p>
                        </div>
                    </div>
                </div>
                <nav class="flex-1 overflow-y-auto p-4 space-y-1 relative" id="adminNavContainer">
                    <div id="adminNav" class="space-y-1">
                        <!-- Nav items injected here -->
                    </div>
                    <!-- Settings Sub-menu Panel -->
                    <div id="settingsPanel" class="settings-panel p-4">
                        <div class="flex items-center gap-2 mb-6 pb-4 border-b border-slate-100">
                            <button onclick="closeSettingsPanel()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500">
                                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            </button>
                            <h3 class="font-bold text-slate-800">Settings</h3>
                        </div>
                        <div id="settingsSubNav" class="space-y-1">
                            <!-- Settings edit items injected here -->
                        </div>
                    </div>
                </nav>
                <div class="p-4 border-t border-slate-100">
                    <button onclick="logout()" class="flex items-center gap-3 w-full p-3 rounded-xl text-red-500 hover:bg-red-50 transition-all font-bold text-sm">
                        <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                    </button>
                </div>
            </aside>

            <!-- Mobile Admin Nav Toggle -->
            <div id="mobileAdminNav" class="md:hidden bg-white border-b border-slate-200 p-4 sticky top-20 z-40 flex justify-between items-center">
                <span class="font-bold text-slate-800" id="mobileCurrentSection">Dashboard</span>
                <button onclick="toggleMobileMenu()" class="p-2 bg-slate-100 rounded-lg">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="flex-1 flex flex-col">
                <header class="bg-white border-b border-slate-200 px-6 py-4 hidden md:flex justify-between items-center sticky top-20 z-30">
                    <div class="flex items-center gap-4">
                        <h1 class="text-lg md:text-xl font-bold text-slate-800" id="dashTitle">Dashboard</h1>
                    </div>
                    <div id="dashHeaderActions" class="flex items-center gap-4">
                        <button onclick="setAdminSection('notifications')" class="p-2 bg-slate-100 rounded-xl text-slate-500 hover:text-farm-green transition-all relative">
                            <i data-lucide="bell" class="w-5 h-5"></i>
                            <div id="notifBadge" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-[10px] flex items-center justify-center rounded-full font-bold">0</div>
                        </button>
                        <!-- Actions like "Add User" injected here -->
                    </div>
                </header>
                <main class="p-4 md:p-8 flex-1">
                    <div id="dashStats" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8">
                        <!-- Stats injected here -->
                    </div>
                    <div id="dashCharts" class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h3 class="text-lg font-bold mb-6">Performance Overview</h3>
                            <canvas id="performanceChart" height="200"></canvas>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h3 class="text-lg font-bold mb-6">Growth Trends</h3>
                            <canvas id="growthChart" height="200"></canvas>
                        </div>
                    </div>
                    <div id="dashContent" class="space-y-6">
                        <!-- Specific section content injected here -->
                    </div>
                </main>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
